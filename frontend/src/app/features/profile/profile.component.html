<div class="profile">
  <h1 class="profile__title">Meu Perfil</h1>

  <app-card class="profile__card" [padding]="cardPadding()">
    <div appCardHeader class="profile__card-header">Informações Pessoais</div>

    <div class="profile__card-body">
      <div class="profile__avatar">
        <app-avatar [name]="fullName()" [size]="avatarSize()" />
        <span class="profile__avatar-name">{{ fullName() }}</span>
        <span class="profile__avatar-email">{{ email() }}</span>
      </div>

      <div class="profile__form">
        <div class="profile__field">
          <app-input
            [label]="'Nome completo'"
            [required]="true"
            [error]="nameError()"
            [(value)]="fullName"
          />
        </div>

        <div class="profile__field">
          <app-input
            [type]="'email'"
            [label]="'E-mail'"
            [disabled]="true"
            [(value)]="email"
          />
          <p class="profile__help">
            O e-mail não pode ser alterado. Entre em contato com o administrador.
          </p>
        </div>

        <div class="profile__field">
          <app-select
            [label]="'Cargo'"
            [options]="roleOptions()"
            [disabled]="true"
            [(value)]="roleId"
          />
        </div>

        <div class="profile__field">
          <app-select
            [label]="'Departamento'"
            [options]="departmentOptions()"
            [disabled]="true"
            [(value)]="departmentId"
          />
        </div>
      </div>
    </div>

    <div appCardFooter class="profile__card-footer">
      <app-button
        [variant]="'default'"
        [loading]="isLoading()"
        (clicked)="onSave()"
      >
        Salvar alterações
      </app-button>
    </div>
  </app-card>
</div>
