<div class="reset-password-page">
  <div class="reset-password-card">
    @if (!isSuccess()) {
      <div class="reset-password-card__icon-wrapper">
        <div class="reset-password-card__icon-circle">
          <lucide-angular name="lock" [size]="48" [strokeWidth]="1.75" />
        </div>
      </div>

      <div class="reset-password-card__header">
        <h1 class="reset-password-card__title">Redefinir senha</h1>
        <p class="reset-password-card__subtitle">
          Escolha uma nova senha para sua conta.
        </p>
      </div>

      <form class="reset-password-card__form" (submit)="$event.preventDefault(); onSubmit()">
        <app-password-input
          [label]="'Nova senha'"
          [required]="true"
          [showStrength]="true"
          [error]="passwordError()"
          [(value)]="password"
          (strengthChange)="onPasswordStrengthChange($event)"
        />

        <app-password-input
          [label]="'Confirmar senha'"
          [required]="true"
          [showStrength]="false"
          [error]="confirmPasswordError()"
          [(value)]="confirmPassword"
        />

        <app-button
          [variant]="'default'"
          [size]="'lg'"
          [type]="'submit'"
          [loading]="isLoading()"
          class="reset-password-card__submit"
        >
          Redefinir senha
        </app-button>
      </form>
    } @else {
      <div class="reset-password-card__icon-wrapper">
        <div class="reset-password-card__icon-circle reset-password-card__icon-circle--success">
          <lucide-angular name="check-circle" [size]="48" [strokeWidth]="1.75" />
        </div>
      </div>

      <div class="reset-password-card__header">
        <h1 class="reset-password-card__title">Senha redefinida!</h1>
        <p class="reset-password-card__subtitle">
          Sua senha foi alterada com sucesso. Faça login com a nova senha.
        </p>
      </div>

      <app-button
        [variant]="'default'"
        [size]="'md'"
        class="reset-password-card__success-action"
        (clicked)="onGoToLogin()"
      >
        Ir para o login
      </app-button>
    }
  </div>
</div>
