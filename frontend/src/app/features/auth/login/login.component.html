<div class="login-page">
  <form class="login-card" (submit)="$event.preventDefault(); onSubmit()">
    <img
      src="assets/images/logo.webp"
      alt="Status Contabilidade"
      class="login-card__logo"
    />

    <div class="login-card__welcome">
      <h1 class="login-card__title">Bem-vindo de volta</h1>
      <p class="login-card__subtitle">Faça login para acessar o sistema</p>
    </div>

    <div class="login-card__form">
      <app-input
        [type]="'email'"
        [label]="'E-mail'"
        [placeholder]="'seu@email.com'"
        [required]="true"
        [error]="emailError()"
        [(value)]="email"
      />

      <app-password-input
        [label]="'Senha'"
        [required]="true"
        [showStrength]="false"
        [error]="passwordError()"
        [(value)]="password"
      />

      <a class="login-card__forgot" (click)="onForgotPassword()" (keydown.enter)="onForgotPassword()" tabindex="0">
        Esqueci minha senha
      </a>

      <app-button
        [variant]="'default'"
        [size]="'lg'"
        [type]="'submit'"
        [loading]="isLoading()"
        class="login-card__submit"
      >
        Entrar
      </app-button>
    </div>
  </form>
</div>
