<div class="team-create">
  <!-- Back button -->
  <button type="button" class="team-create__back" (click)="goBack()">
    <lucide-angular name="arrow-left" [size]="20" [strokeWidth]="1.75" />
    Voltar para equipe
  </button>

  <!-- Header -->
  <div class="team-create__header">
    <h1 class="team-create__title">Novo Colaborador</h1>
    <p class="team-create__subtitle">
      Cadastre um novo colaborador na plataforma. Um e-mail de convite será enviado para ele definir sua senha.
    </p>
  </div>

  <!-- Form Card -->
  <app-card class="team-create__card">
    <div appCardHeader>
      <h2 class="team-create__card-title">Dados do Colaborador</h2>
    </div>

    <div class="team-create__form">
      <!-- Nome -->
      <div class="team-create__field">
        <app-input
          label="Nome completo"
          placeholder="Ex: Maria da Silva"
          [required]="true"
          [(value)]="name"
          [error]="nameError()"
        />
      </div>

      <!-- E-mail -->
      <div class="team-create__field">
        <app-input
          label="E-mail"
          type="email"
          placeholder="Ex: maria@statuscontabilidade.com.br"
          [required]="true"
          [(value)]="email"
          [error]="emailError()"
        />
      </div>

      <!-- Cargo -->
      <div class="team-create__field">
        <app-select
          label="Cargo"
          placeholder="Selecione o cargo"
          [options]="roles"
          [required]="true"
          [(value)]="role"
          [error]="roleError()"
        />
      </div>

      <!-- Departamento -->
      <div class="team-create__field">
        <app-select
          label="Departamento"
          placeholder="Selecione o departamento"
          [options]="departments"
          [required]="true"
          [(value)]="department"
          [error]="departmentError()"
        />
      </div>


    </div>

    <div appCardFooter>
      <div class="team-create__footer">
        <app-button variant="outline" (clicked)="onCancel()">Cancelar</app-button>
        <app-button variant="default" [loading]="submitLoading()" (clicked)="onSubmit()">
          Cadastrar colaborador
        </app-button>
      </div>
    </div>
  </app-card>
</div>

<!-- Discard confirmation modal -->
<app-modal
  [isOpen]="discardModalOpen()"
  title="Descartar alterações?"
  size="sm"
  (closed)="closeDiscardModal()"
>
  <p class="team-create__modal-text">
    Você tem alterações não salvas. Deseja descartar e voltar para a listagem?
  </p>

  <div appModalFooter>
    <div class="team-create__modal-footer">
      <app-button variant="outline" (clicked)="closeDiscardModal()">Continuar editando</app-button>
      <app-button variant="destructive" (clicked)="confirmDiscard()">Descartar</app-button>
    </div>
  </div>
</app-modal>
