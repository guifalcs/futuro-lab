<div class="toast-container" aria-live="polite" aria-label="Notificações">
  @for (toast of toasts(); track trackById($index, toast)) {
    <div
      class="toast"
      [ngClass]="['toast--' + toast.variant, isLeaving(toast.id) ? 'toast--leaving' : '']"
      role="alert"
    >
      <lucide-angular
        [name]="iconByVariant[toast.variant]"
        [size]="20"
        [strokeWidth]="1.75"
        class="toast__icon"
        [ngClass]="'toast__icon--' + toast.variant"
      />
      <span class="toast__message">{{ toast.message }}</span>
      <button
        class="toast__close"
        (click)="dismiss(toast.id)"
        aria-label="Fechar notificação"
        type="button"
      >
        <lucide-angular name="x" [size]="16" [strokeWidth]="1.75" />
      </button>
    </div>
  }
</div>
