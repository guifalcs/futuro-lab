@if (hasLabel()) {
  <label class="select__label" [for]="inputId">
    {{ label() }}
    @if (required()) {
      <span class="select__required" aria-hidden="true">*</span>
    }
  </label>
}

<div class="select__trigger">
  <button
    [id]="inputId"
    type="button"
    class="select__button"
    [class.select__button--error]="hasError()"
    [class.select__button--disabled]="disabled()"
    [class.select__button--open]="isOpen()"
    [attr.disabled]="disabled() ? '' : null"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-required]="required() ? true : null"
    [attr.aria-activedescendant]="activeDescendantId()"
    aria-haspopup="listbox"
    (click)="toggleDropdown()"
    (focus)="onFocus()"
    (blur)="onBlur()"
  >
    <span
      class="select__value"
      [class.select__value--placeholder]="!selectedLabel()"
    >
      {{ selectedLabel() ?? placeholder() }}
    </span>
    <lucide-angular
      name="chevron-down"
      class="select__chevron"
      [class.select__chevron--open]="isOpen()"
      [size]="16"
    />
  </button>

  @if (isOpen()) {
    <div class="select__dropdown">
      <ul class="select__list" role="listbox">
        @for (opt of options(); track opt.value; let i = $index) {
          <li
            [id]="inputId + '-option-' + i"
            class="select__option"
            [class.select__option--selected]="opt.value === value()"
            [class.select__option--highlighted]="i === highlightedIndex()"
            role="option"
            [attr.tabindex]="i === highlightedIndex() ? 0 : -1"
            [attr.aria-selected]="opt.value === value()"
            (click)="selectOption(opt)"
            (keydown.enter)="selectOption(opt)"
            (keydown.space)="selectOption(opt); $event.preventDefault()"
            (mouseenter)="highlightedIndex.set(i)"
          >
            <span>{{ opt.label }}</span>
            @if (opt.value === value()) {
              <lucide-angular
                name="check"
                class="select__check"
                [size]="16"
              />
            }
          </li>
        }
      </ul>
    </div>
  }
</div>

@if (hasError()) {
  <span class="select__error" role="alert">{{ error() }}</span>
}
